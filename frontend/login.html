<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VergeX — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, #1a1060 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #0d2040 0%, transparent 50%); }
        .wrapper { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 24px; }
        .logo { text-align: center; margin-bottom: 36px; }
        .logo-badge { width: 56px; height: 56px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: white; margin: 0 auto 14px; letter-spacing: 1px; }
        .logo-name { font-size: 30px; font-weight: 800; color: white; letter-spacing: 2px; }
        .logo-sub { font-size: 13px; color: #6b7280; margin-top: 6px; }
        .card { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 36px; }
        .card-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 4px; }
        .card-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
        .role-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .role-tab { padding: 10px; border-radius: 10px; border: none; background: transparent; color: #6b7280; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        .role-tab.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #9ca3af; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #6366f1; background: rgba(99,102,241,0.08); }
        .form-input::placeholder { color: #4b5563; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 8px; transition: opacity 0.2s, transform 0.1s; }
        .login-btn:hover { opacity: 0.92; }
        .login-btn:active { transform: scale(0.99); }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
        .hint { margin-top: 20px; padding: 14px 16px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .hint-title { font-size: 11px; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .hint-row { font-size: 12px; color: #6b7280; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .hint-val { color: #9ca3af; font-weight: 500; font-family: monospace; }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="wrapper">
    <div class="logo">
        <div class="logo-badge">VX</div>
        <div class="logo-name">VergeX</div>
        <div class="logo-sub">Employee Performance Analytics Platform</div>
    </div>
    <div class="card">
        <div class="card-title">Sign in</div>
        <div class="card-sub">Select your role to continue</div>
        <div class="role-tabs">
            <button class="role-tab active" id="adminTab" onclick="setRole('admin')">Admin / Manager</button>
            <button class="role-tab" id="empTab" onclick="setRole('employee')">Employee</button>
        </div>
        <div class="form-group">
            <label class="form-label" id="idLabel">Username</label>
            <input class="form-input" id="empId" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="password" placeholder="Enter password">
        </div>
        <div class="error" id="error">Invalid credentials. Please try again.</div>
        <button class="login-btn" onclick="doLogin()">Sign In</button>
        <div class="hint">
            <div class="hint-title">Demo Credentials</div>
            <div class="hint-row"><span>Admin login</span><span class="hint-val">admin / admin123</span></div>
            <div class="hint-row"><span>Employee login</span><span class="hint-val">E001 / emp123</span></div>
            <div class="hint-row"><span>Any employee</span><span class="hint-val">E001–E020 / emp123</span></div>
        </div>
    </div>
</div>
<script>
const API = 'http://127.0.0.1:5000';
let role = 'admin';

function setRole(r) {
    role = r;
    document.getElementById('adminTab').classList.toggle('active', r === 'admin');
    document.getElementById('empTab').classList.toggle('active', r === 'employee');
    document.getElementById('idLabel').textContent = r === 'admin' ? 'Username' : 'Employee ID';
    document.getElementById('empId').placeholder = r === 'admin' ? 'Enter username' : 'e.g. E001';
}

function doLogin() {
    const empId = document.getElementById('empId').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorEl = document.getElementById('error');
    errorEl.style.display = 'none';

    fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ empId, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            errorEl.style.display = 'block';
            return;
        }
        localStorage.setItem('vergex_role', data.role);
        localStorage.setItem('vergex_name', data.name);
        localStorage.setItem('vergex_empId', data.empId);
        if (data.data) localStorage.setItem('vergex_emp', JSON.stringify(data.data));
        if (data.role === 'admin') {
            window.location.href = 'index.html';
        } else {
            window.location.href = 'employee.html';
        }
    })
    .catch(() => { errorEl.textContent = 'Cannot connect to server. Make sure Flask is running.'; errorEl.style.display = 'block'; });
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
